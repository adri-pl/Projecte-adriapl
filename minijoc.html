<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Mini Joc - Captura el Pirata</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #001122;
            font-family: Arial, sans-serif;
        }

        #info {
            text-align: center;
            font-size: 24px;
            color: white;
            margin: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        #circle {
            width: 90px;
            height: 90px;
            background-color: #ff2222;
            border-radius: 50%;
            position: absolute;
            cursor: pointer;
            box-shadow: 0 0 20px #ff0000;
            transition: transform 0.1s;
        }

        #circle:active {
            transform: scale(0.85);
        }
    </style>
</head>
<body>

<p id="info"></p>
<div id="circle"></div>

<script>
    let neededClicks = Math.floor(Math.random() * 31) + 40; // 40 a 70 clicks
    let clicks = 0;
    let timeLeft = 5;

    const circle = document.getElementById("circle");
    const info = document.getElementById("info");

    function moveCircle() {
        const maxX = window.innerWidth - 100;
        const maxY = window.innerHeight - 100;

        const x = Math.random() * maxX;
        const y = Math.random() * maxY;

        circle.style.left = x + "px";
        circle.style.top = y + "px";
    }

    circle.addEventListener("click", () => {
        clicks++;
        moveCircle();
    });

    // Temporizador
    const timer = setInterval(() => {
        timeLeft--;
        info.innerHTML = `Clics: ${clicks}/${neededClicks} &nbsp;&nbsp;&nbsp; Temps: ${timeLeft}s`;

        if (clicks >= neededClicks) {
            clearInterval(timer);
            // Victoria
            let gold = parseInt(localStorage.getItem("gold") || 10);
            gold += 10;
            localStorage.setItem("gold", gold);
            window.location.href = "pirate.html"; // o island.html si prefieres volver directamente
        }

        if (timeLeft <= 0) {
            clearInterval(timer);
            // Derrota
            let lives = parseInt(localStorage.getItem("lives") || 3);
            lives = Math.max(0, lives - 1);
            localStorage.setItem("lives", lives);
            window.location.href = "pirate.html";
        }
    }, 1000);

    // Posición inicial
    moveCircle();
    info.innerHTML = `Clics: ${clicks}/${neededClicks} &nbsp;&nbsp;&nbsp; Temps: ${timeLeft}s`;

</script>
</body>
</html>
