<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Mini Joc - Captura el Pirata</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #001122;
            font-family: Arial, sans-serif;
            color: white;
        }
        #info {
            text-align: center;
            font-size: 24px;
            margin: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #circle {
            width: 90px;
            height: 90px;
            background-color: #ff2222;
            border-radius: 50%;
            position: absolute;
            cursor: pointer;
            box-shadow: 0 0 20px #ff0000;
        }
        #circle:active { transform: scale(0.85); }
    </style>
</head>
<body>

<p id="info"></p>
<div id="circle"></div>

<script>
    let neededClicks = Math.floor(Math.random() * 31) + 40; // 40-70 clics
    let clicks = 0;
    let timeLeft = 5;

    const circle = document.getElementById("circle");
    const info = document.getElementById("info");

    function moveCircle() {
        const maxX = window.innerWidth - 100;
        const maxY = window.innerHeight - 100;
        const x = Math.random() * maxX;
        const y = Math.random() * maxY;
        circle.style.left = x + "px";
        circle.style.top = y + "px";
    }

    circle.addEventListener("click", () => {
        clicks++;
        moveCircle();
    });

    // Temporitzador
    const timer = setInterval(() => {
        timeLeft--;
        info.innerHTML = `Clics: ${clicks}/${neededClicks} &nbsp;&nbsp;&nbsp; Temps restant: ${timeLeft}s`;

        if (clicks >= neededClicks) {
            clearInterval(timer);
            // GUARDEM el temps restant abans de sortir
            localStorage.setItem("minigameTimeLeft", timeLeft);
            localStorage.setItem("minigameClicks", clicks);
            localStorage.setItem("minigameNeeded", neededClicks);

            window.location.href = "pirate.html";   // ← Canvia si vols un altre nom
        }

        if (timeLeft <= 0) {
            clearInterval(timer);
            localStorage.setItem("minigameTimeLeft", 0);
            window.location.href = "pirate.html";
        }
    }, 1000);

    // Posició inicial
    moveCircle();
    info.innerHTML = `Clics: ${clicks}/${neededClicks} &nbsp;&nbsp;&nbsp; Temps restant: ${timeLeft}s`;
</script>
</body>
</html>
